name: Build Node.js for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - name: Install Android NDK
        run: |
          # Node 22 officially recommends NDK r26 or newer for Android builds
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV

      - name: Checkout Node.js
        uses: actions/checkout@v4
        with:
          repository: nodejs/node
          ref: v22.12.0
          path: node

      - name: Configure and Build libnode.so
        run: |
          cd node
          export CC_host="gcc"
          export CXX_host="g++"
          
          # android-configure wrapper doesn't accept extra arguments, 
          # so we patch it to include our shared library and size-reduction flags.
          sed -i 's|--cross-compiling|--cross-compiling --shared --without-npm --without-inspector --with-intl=small-icu|' android_configure.py
          
          # Run Node.js's native android-configure script
          # API level 24 is a good modern baseline for Android
          ./android-configure $ANDROID_NDK_HOME 24 arm64
          
          # Build only the libnode shared library
          make -j$(nproc) libnode

      - name: Collect artifacts
        run: |
          mkdir -p output/bin/arm64-v8a
          mkdir -p output/include/node
          
          # Copy the shared library
          find node/out -name "libnode*.so*" -exec cp {} output/bin/arm64-v8a/ \;
          
          # Copy necessary headers for C++ JNI bridge compilation
          cp node/src/*.h output/include/node/
          cp -r node/deps/v8/include/* output/include/node/
          cp -r node/deps/uv/include/* output/include/node/

      - name: Upload libnode.so Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libnode-arm64-v8a
          path: output/
