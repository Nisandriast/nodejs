name: Build Node.js for Android
on:
  workflow_dispatch:
    inputs:
      node_ref:
        description: 'Node.js tag/branch to build (Stagehand needs ^20.19.0 || >=22.12.0)'
        required: true
        default: 'v20.19.5'
      ndk_version:
        description: 'NDK version (folder name after unzip)'
        required: true
        default: 'r26c'
      android_api:
        description: 'Android SDK/API level (min 28)'
        required: true
        default: '28'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
        include:
          - arch: arm64
            abi: arm64-v8a

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y make g++ gcc

      - name: Set up Python 3.11
        # android-configure's shell preamble probes for python3.11 down to
        # python3.6 explicitly and rejects 3.12+ on older Node tags (like
        # v20.19.0). ubuntu-latest now defaults to 3.12.3, so install 3.11
        # and put it on PATH ahead of the build steps.
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android NDK
        run: |
          wget -q "https://dl.google.com/android/repository/android-ndk-${{ github.event.inputs.ndk_version }}-linux.zip"
          unzip -q "android-ndk-${{ github.event.inputs.ndk_version }}-linux.zip"
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-${{ github.event.inputs.ndk_version }}" >> $GITHUB_ENV

      - name: Checkout Node.js
        uses: actions/checkout@v4
        with:
          repository: nodejs/node
          ref: ${{ github.event.inputs.node_ref }}
          path: node

      - name: Patch android_configure.py to build shared lib
        run: |
          cd node
          # Confirm the exact anchor string still exists before patching.
          # If Node changes this line upstream, fail loudly instead of
          # silently shipping a non-shared build.
          grep -q -- '--cross-compiling' android_configure.py || {
            echo "ERROR: '--cross-compiling' string not found in android_configure.py — Node source has changed, update this workflow." >&2
            exit 1
          }

          sed -i 's|--cross-compiling|--cross-compiling --shared --without-npm --without-inspector --with-intl=small-icu|' android_configure.py

          # Verify the patch actually took (sed is silent on no-match)
          grep -q -- '--shared' android_configure.py || {
            echo "ERROR: patch did not apply — '--shared' flag missing after sed." >&2
            exit 1
          }

      - name: Drop unbuildable cctest source (aligned_alloc needs API 28+)
        run: |
          cd node
          # test/cctest/test_crypto_clienthello.cc calls aligned_alloc(),
          # which Bionic doesn't declare below Android API 28 (see
          # https://github.com/official-stockfish/Stockfish/issues/2979 for
          # the same symptom in another cross-compiled project). Node's
          # own android-configure/docs don't special-case cctest at all —
          # they just say `make` — so this file fails whenever the target
          # API is < 28, which our workflow's whole point is to support
          # (default 24). cctest is Node's C++ test binary; it produces no
          # part of libnode.so, so removing this one source from its gyp
          # target is safe and has no effect on the shared library we ship.
          grep -q "test/cctest/test_crypto_clienthello.cc" node.gyp || {
            echo "ERROR: anchor line not found in node.gyp — Node source has changed, update this workflow." >&2
            exit 1
          }

          sed -i "/'test\/cctest\/test_crypto_clienthello\.cc',/d" node.gyp

          grep -q "test/cctest/test_crypto_clienthello.cc" node.gyp && {
            echo "ERROR: sed did not remove the line — check the pattern still matches." >&2
            exit 1
          }
          echo "OK: test_crypto_clienthello.cc removed from node.gyp sources."

      - name: Configure and build libnode.so (${{ matrix.arch }})
        run: |
          cd node
          export CC_host="gcc"
          export CXX_host="g++"

          ./android-configure "$ANDROID_NDK_HOME" ${{ github.event.inputs.android_api }} ${{ matrix.arch }}
          make -j"$(nproc)"

      - name: Verify shared library was produced
        run: |
          cd node
          SOFILE=$(find out -name "libnode.so.*" -o -name "libnode.so" | head -n1)
          if [ -z "$SOFILE" ]; then
            echo "ERROR: no libnode.so* produced — build likely fell back to a static binary." >&2
            find out -maxdepth 3 -iname "*node*" >&2
            exit 1
          fi
          echo "Found: $SOFILE"
          echo "SOFILE=$SOFILE" >> $GITHUB_ENV

      - name: Collect and rename artifacts (fix Android soname requirement)
        run: |
          mkdir -p output/bin/${{ matrix.abi }}
          mkdir -p output/include/node
          mkdir -p output/include/uv

          # Android's dynamic linker / System.loadLibrary() and your CMake
          # IMPORTED_LOCATION expect an exact "libnode.so" filename.
          # The raw build output is versioned (libnode.so.<NODE_MODULE_VERSION>).
          # objcopy rewrites the internal SONAME to match, then we copy under
          # the plain name so it links/loads correctly on-device.
          if command -v objcopy >/dev/null 2>&1; then
            objcopy --set-soname libnode.so "$SOFILE" "output/bin/${{ matrix.abi }}/libnode.so"
          else
            cp "$SOFILE" "output/bin/${{ matrix.abi }}/libnode.so"
          fi

          # Headers needed for embedding: node core + N-API + libuv.
          cp node/src/*.h output/include/node/
          cp -r node/deps/v8/include/* output/include/node/
          cp -r node/deps/uv/include/* output/include/uv/

      - name: Upload libnode artifact (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: libnode-${{ matrix.abi }}
          path: output/
          if-no-files-found: error
